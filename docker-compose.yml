version: "3.9"

services:
  # ─────────────────────────────────────────────
  # FastAPI Application
  # ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seo_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: seo_network
