[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

# ── Worker Service (Celery) ───────────────────────────────────────────────────
[deploy]
startCommand = "bash -c 'celery -A app.tasks.celery_app worker --pool=solo --queues=seo_analysis --hostname=w1@%h --loglevel=info --max-tasks-per-child=100 & celery -A app.tasks.celery_app worker --pool=solo --queues=seo_analysis --hostname=w2@%h --loglevel=info --max-tasks-per-child=100 & celery -A app.tasks.celery_app worker --pool=solo --queues=seo_analysis --hostname=w3@%h --loglevel=info --max-tasks-per-child=100 & wait'"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
