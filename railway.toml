[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

# ── Web Service (FastAPI) ─────────────────────────────────────────────────────
[deploy]
startCommand = "/bin/sh -c \"uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2 --loop uvloop --http httptools\""
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
